meta:
  name: мой-cra-проект           # ← можно убрать или поменять
  environment: static            # ← самое важное! или runtime: static (в новых версиях пишут runtime)
  # toolchain не нужен для static

build:
  commands:                      # вместо additionalCommands
    - npm ci                     # или yarn install --frozen-lockfile
    - npm run build

run:
  web:
    workdir: build               # ← Amvera будет раздавать файлы именно из этой папки
    # port: 80                   # обычно не нужно указывать
    spa: true                    # ← важно для React Router — все пути → index.html