meta:
  environment: node
  toolchain:
    name: browser          # ← это ключ! для статических React/Vue/Angular приложений после билда
    version: "18"          # или 20 — та же, что была в твоём файле

build:
  skip: false
  additionalCommands: null
  artifacts:
    build/*: /             # ← артефакты из папки build/ → в корень контейнера

run:
  web:                     # ← вместо scriptName/command используем блок web для статики
    workdir: build         # ← точка, откуда раздавать файлы
    spa: true              # ← для React Router (все пути → index.html)
  # можно оставить containerPort: "80", но обычно не обязательно