meta:
  environment: node
  toolchain:
    name: browser
    version: "18"          # или "20", если твой проект на новой версии Node

build:
  artifacts:
    build/*: /             # копирует всё из ./build в корень контейнера (/app)

run:
  web:
    workdir: build         # раздавать статику именно из этой папки
    spa: true              # rewrite всех путей на index.html (для React Router)